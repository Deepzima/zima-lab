# zlab vm-linux template — Linux VM for bare-metal simulation
# Usage: zlab init --template vm-linux
#
# Supported images: ubuntu:{24.04,22.04,20.04}, debian:{12,11},
#   fedora:{41,40}, alpine:{3.21,3.20}, archlinux, rocky:9,
#   opensuse:tumbleweed, or a direct URL/path

project: linux-lab
tenant: study

assets:
  - name: node1
    type: vm
    config:
      image: "ubuntu:24.04"    # change to any supported distro
      cpus: 2
      memory: "4GiB"
      disk: "20GiB"
      vm_type: "qemu"          # or "vz" for macOS Virtualization.framework
      rosetta: true             # x86 emulation on Apple Silicon
      containerd: true          # container runtime inside VM
      ports:
        - guest: 22
          host: 2222
        - guest: 80
          host: 8080
      mounts:
        - location: "/tmp/shared"
          writable: true
      dns:
        - "8.8.8.8"
        - "1.1.1.1"
      provision:
        - mode: system
          inline: |
            apt-get update -y
            apt-get install -y curl git htop

network:
  name: zlab-${project}
  subnet: "172.30.4.0/24"
  dns: true
