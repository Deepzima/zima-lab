# VictoriaMetrics scrape config for zlab observability
# Mounted into VictoriaMetrics via -promscrape.config flag

scrape_configs:
  - job_name: cadvisor
    scrape_interval: 15s
    static_configs:
      - targets: ["zlab-cadvisor:8080"]

  - job_name: victoriametrics
    scrape_interval: 30s
    static_configs:
      - targets: ["localhost:8428"]

  - job_name: loki
    scrape_interval: 30s
    static_configs:
      - targets: ["zlab-loki:3100"]
    metrics_path: /metrics
