# zlab observability — lightweight stack
# VictoriaMetrics + Grafana + Loki
# Low resource usage, good for daily dev work

services:
  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.103.0
    container_name: zlab-vm
    ports:
      - "${ZLAB_PORT_VM:-8428}:8428"
    volumes:
      - vm-data:/storage
      - ./vmagent-scrape.yml:/etc/vm/scrape.yml:ro
    command:
      - "--storageDataPath=/storage"
      - "--retentionPeriod=7d"
      - "--httpListenAddr=:8428"
      - "--promscrape.config=/etc/vm/scrape.yml"
    depends_on:
      - cadvisor
    restart: unless-stopped
    labels:
      zlab.component: observability
      zlab.stack: lightweight

  grafana:
    image: grafana/grafana:11.4.0
    container_name: zlab-grafana
    ports:
      - "${ZLAB_PORT_GRAFANA:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: zlab
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/system-overview.json
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning/datasources/datasources-lightweight.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
      - ./grafana/provisioning/dashboards/dashboards.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - victoriametrics
      - loki
    restart: unless-stopped
    labels:
      zlab.component: observability
      zlab.stack: lightweight

  loki:
    image: grafana/loki:3.3.0
    container_name: zlab-loki
    ports:
      - "${ZLAB_PORT_LOKI:-3100}:3100"
    volumes:
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped
    labels:
      zlab.component: observability
      zlab.stack: lightweight

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: zlab-cadvisor
    ports:
      - "${ZLAB_PORT_CADVISOR:-8080}:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    restart: unless-stopped
    labels:
      zlab.component: observability
      zlab.stack: lightweight

volumes:
  vm-data:
  grafana-data:
  loki-data:
